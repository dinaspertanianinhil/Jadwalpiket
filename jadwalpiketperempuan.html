<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jadwal Piket Perempuan</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
    margin:0;
    font-family:'Poppins','Segoe UI',sans-serif;
    background:url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTdDTXGJIkjphkmC30hMYVpmbZwDdy1XzTH3jFDe16W10jQRXa5mLkwfmLq&s=10') no-repeat center center fixed;
    background-size:cover;
    color:white;
}

.overlay{
    background:linear-gradient(135deg, rgba(0,0,0,0.75), rgba(0,40,0,0.75));
    min-height:100vh;
    padding:60px 20px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.header-dinas{
    text-align:center;
    margin-bottom:40px;
}

.header-dinas h1{
    margin:0;
    font-size:26px;
    letter-spacing:3px;
    font-weight:700;
    animation:fadeDown 1s ease;
}

.header-dinas p{
    margin-top:8px;
    font-size:14px;
    letter-spacing:2px;
    opacity:0.9;
    animation:fadeDown 1.3s ease;
}

.card{
    width:100%;
    max-width:520px;
    padding:35px;
    border-radius:25px;
    backdrop-filter:blur(18px);
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.25);
    box-shadow:0 25px 60px rgba(0,0,0,0.6);
    text-align:center;
    animation:fadeUp 1.2s ease;
}

.card h3{
    margin:0 0 15px 0;
    font-size:18px;
    letter-spacing:2px;
    font-weight:600;
}

.tanggal{
    margin-bottom:20px;
    font-size:14px;
    opacity:0.9;
}

ul{
    list-style:none;
    padding:0;
    margin:0 0 25px 0;
}

li{
    padding:12px;
    margin:8px 0;
    border-radius:14px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(8px);
    font-weight:500;
    transition:0.3s;
}

li:hover{
    background:rgba(255,255,255,0.25);
    transform:scale(1.02);
}

.floating-download{
    position:fixed;
    right:20px;
    bottom:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:#e53935;
    border:none;
    color:white;
    font-size:26px;
    cursor:pointer;
    box-shadow:0 12px 30px rgba(0,0,0,0.6);
    display:flex;
    align-items:center;
    justify-content:center;
    transition:0.3s;
}

.floating-download:hover{
    transform:scale(1.12);
    background:#ff5252;
}

@keyframes fadeDown{
    from{opacity:0;transform:translateY(-30px);}
    to{opacity:1;transform:translateY(0);}
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(40px);}
    to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="overlay">

    <div class="header-dinas">
        <h1>DINAS PERTANIAN</h1>
        <p>KABUPATEN INDRAGIRI HILIR</p>
    </div>

    <div class="card">
        <h3>JADWAL PIKET JUMAT</h3>
        <div class="tanggal" id="tanggal"></div>
        <ul id="petugas"></ul>
    </div>

</div>

<button class="floating-download" onclick="downloadExcel()">⬇️</button>

<script>

// DATA FIX (MULAI 17 APRIL)
const jadwalAwal = [
{
tanggal:"2026-04-17",
petugas:["Sukmayani","Novia Dwi A","Lisa Susanti","Gusti Ayu","Afrinola Mandrasari","Ema Hikmah"]
},
{
tanggal:"2026-04-24",
petugas:["Siti Fatimah","Dwi Febri C","Tri Indah R","Yulia Anggraita","Dewi Wardati","Ratih Cristina Dewi",,"Tina Fitriani"]
},
{
tanggal:"2026-05-08",
petugas:["Khairiah","Misnah","Ayuni Apri Lanika","Sri Suryani","Annisa Angraini","Selvia"]
},
{
tanggal:"2026-05-15",
petugas:["Rifa'atul Ridha","Liani","Maya Restia N","Fatimah","Nurpah","Siti Zubaidah"]
},
{
tanggal:"2026-05-22",
petugas:["Nita Hayati","Thiara Septina D","Indah Chairunnisa","Yusa Alisa Putri","Riska Wulandari","Nova Yunita"]
},
{
tanggal:"2026-05-29",
petugas:["Sarinah","Kurniati Ramayulis","Widuri Novelasari","Sri Wahyuni","Megawati","Saniah"]
},
{
tanggal:"2026-06-05",
petugas:["Vera Gustina","Resti Tiaranti","Vanissa Aldi","Rodiana Wirasati","Rosmawati","Sartika Yuliani"]
}
];

// kumpulkan semua nama
let semuaNama = [];
jadwalAwal.forEach(j => semuaNama.push(...j.petugas));

// cari Jumat berjalan
function getNextFriday(){
    const today = new Date();
    let diff = 5 - today.getDay();
    if(diff < 0) diff += 7;
    let friday = new Date(today);
    friday.setDate(today.getDate() + diff);
    return friday;
}

// generate lanjutan
function generateSchedule(){
    let schedule=[...jadwalAwal];
    let index=semuaNama.length;

    let last=new Date(jadwalAwal[jadwalAwal.length-1].tanggal);

    for(let i=0;i<30;i++){
        last.setDate(last.getDate()+7);

        let team=[];
        for(let j=0;j<6;j++){
            team.push(semuaNama[index % semuaNama.length]);
            index++;
        }

        schedule.push({
            tanggal:last.toISOString().split("T")[0],
            petugas:team
        });
    }

    return schedule;
}

const schedule = generateSchedule();
const target = getNextFriday();
const targetISO = target.toISOString().split("T")[0];

// tampil tanggal
document.getElementById("tanggal").textContent =
target.toLocaleDateString("id-ID",{weekday:"long",year:"numeric",month:"long",day:"numeric"});

// tampil petugas
const data = schedule.find(s=>s.tanggal===targetISO);
const list = document.getElementById("petugas");

if(data){
    data.petugas.forEach(n=>{
        const li=document.createElement("li");
        li.textContent=n;
        list.appendChild(li);
    });
}else{
    list.innerHTML="<li>Belum ada jadwal</li>";
}

// download excel
function downloadExcel(){
    const now=new Date();

    const dataBulan = schedule.filter(s=>{
        const d=new Date(s.tanggal);
        return d.getMonth()===now.getMonth();
    });

    const ws=XLSX.utils.aoa_to_sheet([
        ["Tanggal","Petugas 1","Petugas 2","Petugas 3","Petugas 4","Petugas 5","Petugas 6"],
        ...dataBulan.map(s=>[s.tanggal,...s.petugas])
    ]);

    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Jadwal");
    XLSX.writeFile(wb,"Piket_Perempuan.xlsx");
}

</script>

</body>
</html>
