<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piket Perempuan</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
/* UI SAMA */
body{
    margin:0;
    font-family:'Poppins','Segoe UI',sans-serif;
    background:url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTdDTXGJIkjphkmC30hMYVpmbZwDdy1XzTH3jFDe16W10jQRXa5mLkwfmLq&s=10') no-repeat center center fixed;
    background-size:cover;
    color:white;
}
.overlay{
    background:linear-gradient(135deg, rgba(0,0,0,0.75), rgba(0,40,0,0.75));
    min-height:100vh;
    padding:60px 20px;
    display:flex;
    flex-direction:column;
    align-items:center;
}
.card{
    width:100%;
    max-width:520px;
    padding:35px;
    border-radius:25px;
    backdrop-filter:blur(18px);
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.25);
    text-align:center;
}
.tanggal{margin-bottom:20px;}
li{
    padding:12px;
    margin:8px 0;
    border-radius:14px;
    background:rgba(255,255,255,0.15);
}
.floating-download{
    position:fixed;right:20px;bottom:20px;
    width:60px;height:60px;border-radius:50%;
    background:#e53935;color:white;font-size:26px;
    border:none;cursor:pointer;
}
</style>
</head>

<body>

<div class="overlay">
    <div class="card">
        <h3>JADWAL PIKET PEREMPUAN</h3>
        <div class="tanggal" id="tanggal"></div>
        <ul id="petugas"></ul>
    </div>
</div>

<button class="floating-download" onclick="downloadExcel()">⬇️</button>

<script>

// DATA ASLI (FIX DARI KAMU)
const jadwalAwal = [
{
tanggal:"2026-04-17",
petugas:["Sukmayani","Novia Dwi A","Lisa Susanti","Gusti Ayu","Afrinola Mandrasari","Ema Hikmah"]
},
{
tanggal:"2026-04-24",
petugas:["Siti Fatimah","Dwi Febri C","Tri Indah R","Yulia Anggraita","Dewi Wardati","Ratih Cristina Dewi"]
},
{
tanggal:"2026-05-08",
petugas:["Khairiah","Misnah","Ayuni Apri Lanika","Sri Suryani","Annisa Angraini","Selvia"]
},
{
tanggal:"2026-05-15",
petugas:["Rifa'atul Ridha","Liani","Maya Restia N","Fatimah","Nurpah","Siti Zubaidah"]
},
{
tanggal:"2026-05-22",
petugas:["Nita Hayati","Thiara Septina D","Indah Chairunnisa","Yusa Alisa Putri","Riska Wulandari","Nova Yunita"]
},
{
tanggal:"2026-05-29",
petugas:["Sarinah","Kurniati Ramayulis","Widuri Novelasari","Sri Wahyuni","Megawati","Saniah"]
},
{
tanggal:"2026-06-05",
petugas:["Vera Gustina","Resti Tiaranti","Vanissa Aldi","Rodiana Wirasati","Rosmawati","Sartika Yuliani"]
}
];

// ambil semua nama untuk rolling lanjutan
let semuaNama = [];
jadwalAwal.forEach(j => semuaNama.push(...j.petugas));

// cari Jumat minggu berjalan
function getNextFriday(){
    const today = new Date();
    let diff = 5 - today.getDay();
    if(diff < 0) diff += 7;

    let friday = new Date(today);
    friday.setDate(today.getDate() + diff);
    return friday;
}

// generate lanjutan setelah data awal
function generateNextSchedule(){
    let schedule = [...jadwalAwal];
    let index = semuaNama.length;

    let lastDate = new Date(jadwalAwal[jadwalAwal.length-1].tanggal);

    for(let i=0;i<30;i++){
        lastDate.setDate(lastDate.getDate()+7);

        let team=[];
        for(let j=0;j<6;j++){
            team.push(semuaNama[index % semuaNama.length]);
            index++;
        }

        schedule.push({
            tanggal:lastDate.toISOString().split("T")[0],
            petugas:team
        });
    }

    return schedule;
}

const schedule = generateNextSchedule();
const target = getNextFriday();
const targetISO = target.toISOString().split("T")[0];

// tampilkan tanggal
document.getElementById("tanggal").textContent =
target.toLocaleDateString("id-ID",{weekday:"long",year:"numeric",month:"long",day:"numeric"});

// tampilkan petugas
const data = schedule.find(s=>s.tanggal===targetISO);
const list = document.getElementById("petugas");

if(data){
    data.petugas.forEach(n=>{
        const li=document.createElement("li");
        li.textContent=n;
        list.appendChild(li);
    });
}else{
    list.innerHTML="<li>Belum ada jadwal</li>";
}

// download excel bulan berjalan
function downloadExcel(){
    const now=new Date();

    const dataBulan = schedule.filter(s=>{
        const d=new Date(s.tanggal);
        return d.getMonth()===now.getMonth();
    });

    const ws=XLSX.utils.aoa_to_sheet([
        ["Tanggal","Petugas 1","Petugas 2","Petugas 3","Petugas 4","Petugas 5","Petugas 6"],
        ...dataBulan.map(s=>[s.tanggal,...s.petugas])
    ]);

    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Jadwal");
    XLSX.writeFile(wb,"Piket_Perempuan.xlsx");
}

</script>

</body>
</html>
