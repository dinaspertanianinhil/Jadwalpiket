<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Jadwal Piket</title>

<style>
body{
    margin:0;
    font-family:'Poppins','Segoe UI',sans-serif;
    background:url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTdDTXGJIkjphkmC30hMYVpmbZwDdy1XzTH3jFDe16W10jQRXa5mLkwfmLq&s=10') no-repeat center center fixed;
    background-size:cover;
    color:white;
    overflow:hidden;
}

/* OVERLAY */
.overlay{
    background:linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,50,0,0.8));
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

/* HEADER */
.header h1{
    font-size:28px;
    letter-spacing:3px;
    margin:0;
    animation:fadeDown 1s ease;
}

.header p{
    margin-top:10px;
    opacity:0.8;
    letter-spacing:2px;
    animation:fadeDown 1.4s ease;
}

/* CARD CONTAINER */
.menu{
    margin-top:50px;
    display:flex;
    gap:25px;
    flex-wrap:wrap;
    justify-content:center;
}

/* CARD BUTTON */
.card{
    width:220px;
    height:160px;
    border-radius:20px;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.25);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:0.4s;
    box-shadow:0 15px 40px rgba(0,0,0,0.5);
    animation:fadeUp 1.2s ease;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
    background:rgba(255,255,255,0.2);
}

/* ICON */
.icon{
    font-size:40px;
    margin-bottom:10px;
}

/* TEXT */
.card span{
    font-weight:600;
    letter-spacing:1px;
}

/* ANIMATION */
@keyframes fadeDown{
    from{opacity:0;transform:translateY(-30px);}
    to{opacity:1;transform:translateY(0);}
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(40px);}
    to{opacity:1;transform:translateY(0);}
}

/* FOOTER */
.footer{
    position:absolute;
    bottom:15px;
    font-size:12px;
    opacity:0.6;
}
</style>
</head>

<body>

<div class="overlay">

    <div class="header">
        <h1>SISTEM JADWAL PIKET</h1>
        <p>DINAS PERTANIAN INDRAGIRI HILIR</p>
    </div>

    <div class="menu">
        
        <div class="card" onclick="goTo('jadwalpiketlaki.html')">
            <div class="icon">👨</div>
            <span>Piket Laki-laki</span>
        </div>

        <div class="card" onclick="goTo('jadwalpiketperempuan.html')">
            <div class="icon">👩</div>
            <span>Piket Perempuan</span>
        </div>

    </div>

    <div class="footer">
        © 2026 Sistem Internal Dinas
    </div>

</div>

<script>
function goTo(page){
    window.location.href = page;
}
</script>

</body>
</html>
